name: Daily question drop

# Fires the daily question from OUTSIDE Render, so the drop happens even if the
# Render instance is asleep (the request also wakes it). The endpoint is
# idempotent and Eastern-correct, so running twice is harmless — the second run
# is a no-op once the question exists.
on:
  schedule:
    - cron: '0 10 * * *'   # 06:00 America/New_York during EDT (summer)
    - cron: '0 11 * * *'   # 06:00 America/New_York during EST (winter)
  workflow_dispatch: {}     # lets you trigger it manually from the Actions tab

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger daily publish
        env:
          TASK_TOKEN: ${{ secrets.ADMIN_TASK_TOKEN }}
        run: |
          curl -fsS -X POST "https://whatisdailytrivia.onrender.com/api/publish" \
            -H "x-task-token: $TASK_TOKEN" \
            -H "Content-Type: application/json" \
            --max-time 120 \
            -w "\nHTTP %{http_code}\n"
